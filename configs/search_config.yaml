strategy: random        # "random" or "grid"
trainer: mlp            # "mlp" or "rl"
n_trials: 12
max_steps: 80
max_concurrent_trials: 4
seed: 42

sha:
  max_steps: 80
  min_steps: 10
  eta: 3                # keep top 1/3 at each rung

param_space:
  learning_rate:
    type: log_uniform
    low: 0.00001
    high: 0.1
  hidden_dim:
    type: int_log
    low: 16
    high: 512
  dropout:
    type: uniform
    low: 0.0
    high: 0.5
  weight_decay:
    type: log_uniform
    low: 0.000001
    high: 0.01
